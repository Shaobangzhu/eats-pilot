services:
  postgres:
    image: postgres:16
    container_name: eats-pilot-postgres
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: eatspilot
      POSTGRES_PASSWORD: eatspilot_dev_password
      POSTGRES_DB: eats_pilot
    volumes:
      - eats_pilot_pgdata:/var/lib/postgresql/data

volumes:
  eats_pilot_pgdata: